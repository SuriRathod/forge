<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>FORGE</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FORGE">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230a0a0a'/><text y='62' x='50' text-anchor='middle' font-size='52' font-family='Arial Black,sans-serif' font-weight='900' fill='%23C8FF00'>F</text><rect x='18' y='70' width='64' height='5' rx='2.5' fill='%23C8FF00' opacity='.4'/></svg>">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230a0a0a'/><text y='62' x='50' text-anchor='middle' font-size='52' font-family='Arial Black,sans-serif' font-weight='900' fill='%23C8FF00'>F</text><rect x='18' y='70' width='64' height='5' rx='2.5' fill='%23C8FF00' opacity='.4'/></svg>">

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#181818;--s3:#202020;--s4:#2a2a2a;
  --b1:#1e1e1e;--b2:#2c2c2c;--b3:#3a3a3a;
  --accent:#C8FF00;--a-dim:rgba(200,255,0,.1);--a-mid:rgba(200,255,0,.25);
  --orange:#FF6B2B;--o-dim:rgba(255,107,43,.1);
  --green:#39D353;--g-dim:rgba(57,211,83,.1);
  --blue:#4DA6FF;--b-dim:rgba(77,166,255,.1);
  --red:#FF4757;
  --t1:#F5F5F5;--t2:#999;--t3:#555;--t4:#333;
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:68px;
}
html{height:100%;background:var(--bg)}
body{
  height:100%;background:var(--bg);color:var(--t1);
  font-family:var(--fb);overflow:hidden;
  display:flex;flex-direction:column;max-width:430px;margin:0 auto;
  position:relative;
}

/* SCREENS */
#app{flex:1;overflow:hidden;position:relative}
.screen{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);
  display:none;
}
.screen.active{display:block}

/* NAV BAR */
#nav{
  height:calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--s1);border-top:1px solid var(--b1);
  display:flex;align-items:flex-start;flex-shrink:0;
  position:relative;z-index:50;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:12px 4px 0;cursor:pointer;
  color:var(--t3);transition:color .15s;border:none;background:none;font-family:var(--fb);
}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:22px;line-height:1;display:block}
.nav-label{font-size:10px;letter-spacing:.5px;font-weight:500;text-transform:uppercase}

/* TOAST */
#toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--s2);border:1px solid var(--b2);border-radius:24px;
  padding:10px 20px;font-size:13px;color:var(--t1);z-index:200;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;
  font-family:var(--fb);
}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.t-good{border-color:var(--green);color:var(--green)}
#toast.t-warn{border-color:var(--orange);color:var(--orange)}

/* SHEET MODAL */
#sheet-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px);
}
#sheet-overlay.open{opacity:1;pointer-events:all}
#sheet{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:430px;background:var(--s2);
  border-radius:24px 24px 0 0;border-top:1px solid var(--b2);
  z-index:101;transition:transform .35s cubic-bezier(.32,0,.67,0);
  padding-bottom:calc(var(--safe-bottom) + 16px);
  max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
#sheet.open{transform:translateX(-50%) translateY(0);transition-timing-function:cubic-bezier(.33,1,.68,1)}
.sheet-handle{width:36px;height:4px;background:var(--b3);border-radius:2px;margin:12px auto 20px}
.sheet-title{font-family:var(--fd);font-size:26px;font-weight:700;letter-spacing:.5px;padding:0 20px;margin-bottom:20px}

/* COMPONENTS */
.page-top{padding:20px 20px 0}
.page-title{font-family:var(--fd);font-size:42px;font-weight:700;letter-spacing:1px;line-height:1}
.page-sub{font-size:13px;color:var(--t2);margin-top:4px}

.card{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:16px}
.card+.card{margin-top:10px}

.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  border:none;border-radius:12px;cursor:pointer;
  font-family:var(--fd);font-weight:600;letter-spacing:.5px;
  transition:all .15s;-webkit-user-select:none;user-select:none;
}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--accent);color:#000;font-size:17px;padding:15px;width:100%}
.btn-secondary{background:var(--s3);color:var(--t1);font-size:15px;padding:13px;width:100%;border:1px solid var(--b2)}
.btn-ghost{background:transparent;color:var(--t2);font-size:14px;padding:10px 16px;border:1px solid var(--b2)}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:8px}
.btn-icon{width:40px;height:40px;border-radius:10px;background:var(--s3);color:var(--t2);font-size:18px;flex-shrink:0}

/* FORM */
.form-group{margin-bottom:14px;padding:0 20px}
.form-label{font-size:11px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:6px}
.form-input{
  width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:12px;
  padding:14px 16px;color:var(--t1);font-size:16px;font-family:var(--fb);
  outline:none;-webkit-appearance:none;appearance:none;
}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;margin-bottom:14px}
.form-row .form-group{padding:0;margin:0}
.form-row-3{grid-template-columns:1fr 1fr 1fr}
select.form-input option{background:var(--s2)}

/* PILL TAGS */
.tag{display:inline-block;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;font-family:var(--fd)}
.tag-push{background:rgba(77,166,255,.15);color:var(--blue)}
.tag-pull{background:rgba(57,211,83,.15);color:var(--green)}
.tag-legs{background:rgba(255,107,43,.15);color:var(--orange)}
.tag-cardio{background:rgba(200,255,0,.12);color:var(--accent)}
.tag-hotel{background:rgba(255,71,87,.12);color:var(--red)}
.tag-rest{background:var(--s3);color:var(--t3)}

/* ─── SCREEN: HOME ─── */
.home-hero{
  background:linear-gradient(135deg,var(--s2) 0%,var(--s1) 100%);
  margin:16px;border-radius:20px;padding:20px;
  border:1px solid var(--b1);position:relative;overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,var(--a-dim) 0%,transparent 70%);
}
.hero-greeting{font-size:13px;color:var(--t2);margin-bottom:4px}
.hero-name{font-family:var(--fd);font-size:36px;font-weight:700;letter-spacing:.5px;line-height:1}
.hero-streak{display:flex;align-items:baseline;gap:6px;margin-top:12px}
.streak-num{font-family:var(--fd);font-size:52px;font-weight:700;color:var(--accent);line-height:1}
.streak-label{font-size:13px;color:var(--t2)}
.profile-row{display:flex;gap:8px;margin:0 16px 16px;overflow-x:auto;padding-bottom:2px}
.profile-chip{
  padding:8px 16px;border-radius:20px;border:1px solid var(--b2);
  background:transparent;color:var(--t3);cursor:pointer;font-size:13px;
  font-family:var(--fb);font-weight:500;white-space:nowrap;flex-shrink:0;
}
.profile-chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
.add-partner-btn{padding:8px 14px;border-radius:20px;border:1px dashed var(--b3);background:transparent;color:var(--t3);cursor:pointer;font-size:13px;font-family:var(--fb);white-space:nowrap;flex-shrink:0}

.next-session-card{
  margin:0 16px 12px;background:var(--s1);border:1px solid var(--b1);
  border-radius:20px;overflow:hidden;
}
.nsc-header{padding:16px 16px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.nsc-label{font-size:11px;color:var(--t3);letter-spacing:2px;text-transform:uppercase}
.nsc-title{font-family:var(--fd);font-size:28px;font-weight:700;letter-spacing:.5px;margin-top:2px}
.nsc-exercises{padding:12px 16px}
.nsc-ex{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--b1)}
.nsc-ex:last-child{border-bottom:none}
.nsc-ex-name{font-size:13px;color:var(--t1)}
.nsc-ex-meta{font-size:12px;color:var(--t3);font-family:var(--fd);font-weight:600}
.nsc-start-btn{margin:0 16px;padding:14px;background:var(--accent);border:none;border-radius:14px;width:calc(100% - 32px);font-family:var(--fd);font-size:18px;font-weight:700;color:#000;cursor:pointer;margin-bottom:16px;letter-spacing:.5px}
.nsc-start-btn:active{transform:scale(.97)}

.week-strip{margin:0 16px 12px;display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wday{
  background:var(--s1);border:1px solid var(--b1);border-radius:10px;
  padding:8px 4px;text-align:center;cursor:pointer;
}
.wday.today{border-color:rgba(200,255,0,.4);background:var(--a-dim)}
.wday.done{border-color:rgba(57,211,83,.3);background:var(--g-dim)}
.wday.rest-day{opacity:.4}
.wday-name{font-size:8px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.wday-lbl{font-family:var(--fd);font-size:11px;font-weight:600;color:var(--t1);line-height:1.2;min-height:24px;display:flex;align-items:center;justify-content:center}
.wday-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--b2);margin:5px auto 0;display:flex;align-items:center;justify-content:center;font-size:8px}
.wday.done .wday-dot{background:var(--green);border-color:var(--green);color:#000}
.wday.today .wday-dot{border-color:var(--accent)}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 16px 12px}
.stat-box{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px}
.stat-num{font-family:var(--fd);font-size:34px;font-weight:700;line-height:1;color:var(--t1)}
.stat-num.a{color:var(--accent)}
.stat-num.g{color:var(--green)}
.stat-lbl{font-size:11px;color:var(--t3);margin-top:3px;letter-spacing:.5px}

/* ─── SCREEN: SESSION ─── */
.session-header{
  background:var(--s1);border-bottom:1px solid var(--b1);
  padding:16px;position:sticky;top:0;z-index:10;
}
.sh-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sh-title{font-family:var(--fd);font-size:30px;font-weight:700;letter-spacing:.5px}
.prog-bar{height:4px;background:var(--b1);border-radius:2px;overflow:hidden;margin-top:2px}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}

.ex-card{
  margin:8px 12px;background:var(--s2);border:1px solid var(--b1);
  border-radius:16px;overflow:hidden;transition:border-color .2s;
}
.ex-card.completed{border-color:rgba(57,211,83,.35);background:rgba(57,211,83,.03)}
.ex-card-top{display:flex;align-items:center;gap:12px;padding:14px 14px 12px}
.ex-num{
  width:32px;height:32px;border-radius:8px;background:var(--s3);
  font-family:var(--fd);font-size:16px;font-weight:700;color:var(--t3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ex-card.completed .ex-num{background:var(--g-dim);color:var(--green)}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:15px;font-weight:500;color:var(--t1);line-height:1.2}
.ex-weight-row{display:flex;align-items:center;gap:8px;margin-top:5px}
.ex-weight-display{
  font-family:var(--fd);font-size:22px;font-weight:700;color:var(--accent);
  line-height:1;cursor:pointer;
}
.ex-weight-unit{font-size:12px;color:var(--t3);margin-top:2px}
.ex-reps-info{font-size:12px;color:var(--t2)}
.ex-note-text{font-size:11px;color:var(--t3);font-style:italic;margin-top:3px;line-height:1.4}
.ex-sets-row{display:flex;gap:6px;padding:0 14px 14px;flex-wrap:wrap}
.set-btn{
  height:44px;min-width:44px;padding:0 14px;border-radius:10px;
  border:1.5px solid var(--b2);background:transparent;
  color:var(--t3);font-family:var(--fd);font-size:14px;font-weight:600;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;
}
.set-btn:active{transform:scale(.92)}
.set-btn.done{background:var(--green);border-color:var(--green);color:#000}
.set-btn.partial{border-color:var(--accent);color:var(--accent)}

.add-ex-btn{
  margin:8px 12px;padding:14px;background:transparent;
  border:1px dashed var(--b2);border-radius:16px;
  color:var(--t3);font-size:14px;font-family:var(--fb);
  cursor:pointer;width:calc(100% - 24px);
}
.session-finish-wrap{margin:16px 12px 0}

/* WEIGHT EDITOR INLINE */
.weight-editor{
  padding:12px 14px;background:var(--s3);border-top:1px solid var(--b1);
  display:none;
}
.weight-editor.open{display:block}
.we-row{display:flex;align-items:center;gap:8px}
.we-input{
  flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:10px;
  padding:12px;color:var(--t1);font-size:20px;font-family:var(--fd);font-weight:700;
  text-align:center;outline:none;-webkit-appearance:none;
}
.we-input:focus{border-color:var(--accent)}
.we-adj{width:48px;height:48px;border-radius:10px;background:var(--b2);border:none;color:var(--t1);font-size:22px;cursor:pointer;font-family:var(--fd)}
.we-adj:active{transform:scale(.9)}
.we-save{background:var(--accent);color:#000;border:none;border-radius:10px;padding:12px 20px;font-family:var(--fd);font-size:15px;font-weight:700;cursor:pointer}

/* ─── SCREEN: PLAN ─── */
.plan-mode-toggle{
  display:flex;margin:16px 16px 12px;background:var(--s1);
  border:1px solid var(--b1);border-radius:12px;overflow:hidden;
}
.pmt-btn{
  flex:1;padding:11px 8px;text-align:center;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--t3);border:none;
  background:transparent;font-family:var(--fb);
}
.pmt-btn.active{background:var(--s3);color:var(--t1)}

.plan-day-block{margin:0 12px 8px}
.pdb-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:var(--s2);border:1px solid var(--b1);
  border-radius:14px 14px 0 0;cursor:pointer;
}
.pdb-header.collapsed{border-radius:14px}
.pdb-day{font-size:11px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase}
.pdb-label{font-family:var(--fd);font-size:20px;font-weight:700;letter-spacing:.5px;margin-top:1px}
.pdb-toggle{font-size:18px;color:var(--t3);transition:transform .2s}
.pdb-toggle.open{transform:rotate(180deg)}
.pdb-exercises{border:1px solid var(--b1);border-top:none;border-radius:0 0 14px 14px;overflow:hidden}
.pdb-ex-row{
  display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--b1);
  background:var(--s1);
}
.pdb-ex-row:last-child{border-bottom:none}
.pdb-ex-name{flex:1;font-size:14px;color:var(--t1)}
.pdb-ex-weight{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--accent);cursor:pointer;padding:4px 8px}
.pdb-ex-meta{font-size:11px;color:var(--t3);margin-top:2px}
.pdb-add-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:12px;border-top:1px dashed var(--b2);background:transparent;
  border:1px solid var(--b1);border-top:1px dashed var(--b2);
  color:var(--t3);font-size:13px;font-family:var(--fb);cursor:pointer;width:100%;
}

/* ─── SCREEN: LOG ─── */
.log-entry{
  margin:0 12px 8px;background:var(--s1);border:1px solid var(--b1);
  border-radius:14px;padding:14px 16px;
}
.le-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.le-date{font-size:11px;color:var(--t3);letter-spacing:.5px}
.le-title{font-family:var(--fd);font-size:20px;font-weight:700;letter-spacing:.5px;margin-top:1px}
.le-stats{display:flex;gap:12px;margin-top:8px}
.le-stat{font-size:12px;color:var(--t2)}
.le-stat span{color:var(--t1);font-weight:500}
.le-ex-list{margin-top:10px;border-top:1px solid var(--b1);padding-top:10px;display:none}
.le-ex-list.open{display:block}
.le-ex-item{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--b1)}
.le-ex-item:last-child{border-bottom:none}
.le-ex-name{font-size:12px;color:var(--t2)}
.le-ex-val{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--t1)}

/* ─── SCREEN: RECORDS ─── */
.records-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px}
.rec-card{
  background:var(--s1);border:1px solid var(--b1);border-radius:14px;
  padding:14px;cursor:pointer;
}
.rec-card:active{transform:scale(.97)}
.rec-exercise{font-size:11px;color:var(--t3);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-val{font-family:var(--fd);font-size:32px;font-weight:700;color:var(--accent);line-height:1}
.rec-unit{font-size:11px;color:var(--t3)}
.rec-date{font-size:10px;color:var(--t3);margin-top:4px}

.add-rec-btn{
  margin:0 12px 12px;padding:14px;background:var(--s1);
  border:1px dashed var(--b2);border-radius:14px;
  color:var(--t2);font-size:14px;font-family:var(--fb);cursor:pointer;width:calc(100% - 24px);
}

/* SELECT SESSION SHEET */
.session-picker{padding:0 0 8px}
.sp-option{
  display:flex;align-items:center;gap:14px;padding:16px 20px;
  border-bottom:1px solid var(--b1);cursor:pointer;
}
.sp-option:active{background:var(--s3)}
.sp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sp-info{flex:1}
.sp-name{font-size:15px;font-weight:500;color:var(--t1)}
.sp-detail{font-size:12px;color:var(--t3);margin-top:2px}
.sp-arrow{font-size:18px;color:var(--t3)}

/* WEIGHT HISTORY in sheet */
.wh-entry{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--b1)}
.wh-date{font-size:12px;color:var(--t3)}
.wh-val{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--accent)}

/* Empty state */
.empty-state{text-align:center;padding:60px 30px;color:var(--t3)}
.empty-icon{font-size:48px;margin-bottom:16px;display:block;opacity:.3}
.empty-text{font-size:14px;line-height:1.7;color:var(--t3)}

/* Separator */
.sep{height:1px;background:var(--b1);margin:0 16px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px}
.section-hdr-title{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--t3);letter-spacing:2px;text-transform:uppercase}

/* HYPERCARE BANNER */
.mode-banner{
  margin:0 12px 12px;padding:12px 16px;border-radius:14px;

const SESSION_TYPES = [
  {key:'pushA',label:'Push A',sub:'Chest dominant',type:'push',dayIdx:0,planKey:'home'},
  {key:'pullA',label:'Pull A',sub:'Back + Bicep',type:'pull',dayIdx:1,planKey:'home'},
  {key:'cardio',label:'Cardio + Core',sub:'Fat loss day',type:'cardio',dayIdx:2,planKey:'home'},
  {key:'legs',label:'Legs',sub:'Full lower body',type:'legs',dayIdx:3,planKey:'home'},

// ═══════════════ STATE ═══════════════
function load(){try{const s=localStorage.getItem('forge3');return s?JSON.parse(s):null}catch{return null}}
function save(){try{localStorage.setItem('forge3',JSON.stringify(S))}catch{}}

function freshUser(name,planType){
  return{
    id:'u'+Date.now(),name,planType,
    plan:{home:JSON.parse(JSON.stringify(PLANS.home)),travel:JSON.parse(JSON.stringify(PLANS.travel))},
    log:[],records:{},
    activeSession:null,
    lastSessionKey:null,
    idCounter:200,
  };
}

const saved=load();
let S=saved||{
  activeUser:'u1',
  screen:'home',
  users:[{...freshUser('You','home'),id:'u1'}],
};
// migration — ensure plan structure
S.users.forEach(u=>{
  if(!u.plan||!u.plan.home){u.plan={home:JSON.parse(JSON.stringify(PLANS.home)),travel:JSON.parse(JSON.stringify(PLANS.travel))};}
  if(!u.records)u.records={};
  if(!u.log)u.log=[];
  if(!u.idCounter)u.idCounter=200;
});

function U(){return S.users.find(u=>u.id===S.activeUser)}
function tagCls(t){return({push:'tag-push',pull:'tag-pull',legs:'tag-legs',cardio:'tag-cardio',hotel:'tag-hotel',rest:'tag-rest'})[t]||'tag-rest'}
function clone(o){return JSON.parse(JSON.stringify(o))}

// ═══════════════ NAVIGATION ═══════════════
function nav(screen, btn){
  S.screen=screen;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+screen).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else{const b=document.querySelector(`[data-screen="${screen}"]`);if(b)b.classList.add('active');}
  renderScreen(screen);
  save();
}

function renderScreen(s){
  if(s==='home')renderHome();
  else if(s==='session')renderSession();
  else if(s==='plan')renderPlan();
  else if(s==='log')renderLog();
  else if(s==='records')renderRecords();
}

// ═══════════════ HOME ═══════════════
function todayIdx(){const d=new Date().getDay();return d===0?6:d-1}
function calcStreak(u){
  if(!u.log||!u.log.length)return 0;
  const sorted=[...u.log].sort((a,b)=>new Date(b.date)-new Date(a.date));
  let streak=0,check=new Date();check.setHours(0,0,0,0);
  for(let i=0;i<sorted.length;i++){
    const ld=new Date(sorted[i].date);ld.setHours(0,0,0,0);
    const diff=Math.round((check-ld)/86400000);
    if(diff<=1){streak++;check=ld;}else break;
  }
  return streak;
}
function nextSessionKey(u){
  const order=['pushA','pullA','cardio','legs','pushB','pullB'];
  if(!u.lastSessionKey)return'pushA';
  const idx=order.indexOf(u.lastSessionKey);
  if(idx===-1)return'pushA';
  // find what hasn't been done this week
  const now=new Date(),weekStart=new Date(now);
  weekStart.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));weekStart.setHours(0,0,0,0);
  const thisWeekTypes=new Set(u.log.filter(l=>new Date(l.date)>=weekStart).map(l=>l.sessionKey));
  for(let i=1;i<=order.length;i++){
    const next=order[(idx+i)%order.length];
    if(!thisWeekTypes.has(next))return next;
  }
  return order[(idx+1)%order.length];
}
function getSessionPlan(key){
  const st=SESSION_TYPES.find(s=>s.key===key);
  if(!st)return null;
  const u=U();
  return{...st,exercises:u.plan[st.planKey][st.dayIdx].exercises};
}

function renderHome(){
  const u=U();
  const streak=calcStreak(u);
  const today=new Date();
  const di=todayIdx();
  const nextKey=nextSessionKey(u);
  const nextST=SESSION_TYPES.find(s=>s.key===nextKey);
  const nextPlan=u.plan[nextST?.planKey||'home'][nextST?.dayIdx||0];

  // week strip
  const days=['M','T','W','T','F','S','S'];
  const dayLabels=['Push A','Pull A','Cardio','Legs','Push B','Pull B','Rest'];
  const weekStart=new Date(today);weekStart.setDate(today.getDate()-(today.getDay()===0?6:today.getDay()-1));weekStart.setHours(0,0,0,0);
  const weekHtml=days.map((d,i)=>{
    const dd=new Date(weekStart);dd.setDate(weekStart.getDate()+i);
    const done=u.log.some(l=>{const ld=new Date(l.date);ld.setHours(0,0,0,0);return ld.getTime()===dd.getTime();});
    const isToday=i===di;
    const planDay=u.plan.home[i];
    const isRest=planDay?.type==='rest';
    return`<div class="wday ${isToday?'today':''} ${done?'done':''} ${isRest&&!done?'rest-day':''}">
      <div class="wday-name">${d}</div>
      <div class="wday-lbl">${dayLabels[i].split(' ').map(w=>w[0]).join('')}</div>
      <div class="wday-dot">${done?'✓':''}</div>
    </div>`;
  }).join('');

  const total=u.log.length;
  const weekSessions=u.log.filter(l=>new Date(l.date)>=weekStart).length;

  // profile chips
  const chips=S.users.map(usr=>`<button class="profile-chip ${usr.id===S.activeUser?'active':''}" onclick="switchUser('${usr.id}')">${usr.name}</button>`).join('');

  const greet=()=>{const h=new Date().getHours();if(h<12)return'Good morning';if(h<17)return'Good afternoon';return'Good evening';};

  document.getElementById('s-home').innerHTML=`
    <div style="height:16px"></div>
    <div class="profile-row">${chips}<button class="add-partner-btn" onclick="openSheet('addUser')">+ Partner</button></div>
    <div class="home-hero">
      <div class="hero-greeting">${greet()}</div>
      <div class="hero-name">${u.name}</div>
      <div class="hero-streak">
        <div class="streak-num">${streak}</div>
        <div class="streak-label">${streak===1?'day streak':'day streak'} 🔥</div>
      </div>
    </div>
    <div style="height:12px"></div>
    <div class="week-strip">${weekHtml}</div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num a">${weekSessions}</div><div class="stat-lbl">This week</div></div>
      <div class="stat-box"><div class="stat-num g">${total}</div><div class="stat-lbl">All time</div></div>
    </div>
    <div class="section-hdr">
      <div class="section-hdr-title">Next up</div>
      <button class="btn btn-ghost btn-sm" onclick="openSheet('pickSession')" style="font-size:12px">Pick different</button>
    </div>
    <div class="next-session-card">
      <div class="nsc-header">
        <div>
          <div class="nsc-label">Suggested session</div>
          <div class="nsc-title">${nextST?.label||'Push A'}</div>
        </div>
        <span class="tag tag-${nextST?.type||'push'}">${nextST?.type||'push'}</span>
      </div>
      <div class="nsc-exercises">
        ${(nextPlan?.exercises||[]).slice(0,4).map(e=>`
          <div class="nsc-ex">
            <div class="nsc-ex-name">${e.name}</div>
            <div class="nsc-ex-meta">${e.sets}×${e.reps}${e.weight?` · ${e.weight}${e.unit?` ${e.unit}`:''}`:''}</div>
          </div>`).join('')}
        ${(nextPlan?.exercises||[]).length>4?`<div style="font-size:11px;color:var(--t3);padding:6px 0">+${(nextPlan?.exercises||[]).length-4} more</div>`:''}
      </div>
    </div>
    <button class="nsc-start-btn" onclick="startSession('${nextKey}')">START SESSION →</button>`;
}

// ═══════════════ SESSION ═══════════════
function startSession(key){
  const u=U();
  const st=SESSION_TYPES.find(s=>s.key===key);
  const planDay=u.plan[st.planKey||'home'][st.dayIdx||0];
  u.activeSession={
    key,label:st.label,type:st.type,
    startTime:new Date().toISOString(),
    exercises:clone(planDay.exercises).map(e=>({...e,completedSets:0,actualWeight:e.weight})),
  };
  save();
  nav('session',document.querySelector('[data-screen="session"]'));
}

function renderSession(){
  const u=U();
  if(!u.activeSession){
    document.getElementById('s-session').innerHTML=`
      <div class="empty-state">
        <span class="empty-icon">▶</span>
        <div class="empty-text">No active session.<br>Pick a workout from Home.</div>
        <div style="height:20px"></div>
        <button class="btn btn-primary" style="width:auto;padding:14px 32px" onclick="openSheet('pickSession')">Pick session</button>
      </div>`;
    return;
  }
  const sess=u.activeSession;
  const totalSets=sess.exercises.reduce((a,e)=>a+e.sets,0);
  const doneSets=sess.exercises.reduce((a,e)=>a+Math.min(e.completedSets,e.sets),0);
  const pct=totalSets?Math.round(doneSets/totalSets*100):0;

  const exHtml=sess.exercises.map((e,ei)=>{
    const allDone=e.completedSets>=e.sets;
    const dots=Array.from({length:e.sets},(_,i)=>{
      const cls=i<e.completedSets?'done':'';
      return`<button class="set-btn ${cls}" onclick="toggleSet(${ei},${i})">
        <span>${i+1}</span>
      </button>`;
    }).join('');
    const wDisplay=e.weight>0?`${e.actualWeight||e.weight}`:'BW';
    const wUnit=e.unit||'';
    return`<div class="ex-card ${allDone?'completed':''}" id="exc-${ei}">
      <div class="ex-card-top">
        <div class="ex-num">${ei+1}</div>
        <div class="ex-info">
          <div class="ex-name">${e.name}</div>
          <div class="ex-weight-row">
            <div onclick="toggleWeightEditor(${ei})">
              <div class="ex-weight-display">${wDisplay}<span class="ex-weight-unit"> ${wUnit}</span></div>
            </div>
            <div class="ex-reps-info">× ${e.reps}</div>
          </div>
          ${e.note?`<div class="ex-note-text">${e.note}</div>`:''}
        </div>
        <button class="btn btn-icon" onclick="openSheet('editEx',{ei:${ei}})" style="font-size:14px">✎</button>
      </div>
      <div class="weight-editor" id="we-${ei}">
        <div class="we-row">
          <button class="we-adj" onclick="adjWeight(${ei},-2.5)">−</button>
          <input class="we-input" id="wei-${ei}" type="number" inputmode="decimal" value="${e.actualWeight||e.weight||0}" onchange="setWeight(${ei},this.value)" step="2.5">
          <button class="we-adj" onclick="adjWeight(${ei},2.5)">+</button>
          <button class="we-save" onclick="saveWeight(${ei})">Save</button>
        </div>
      </div>
      <div class="ex-sets-row">${dots}</div>
    </div>`;
  }).join('');

  document.getElementById('s-session').innerHTML=`
    <div class="session-header">
      <div class="sh-top">
        <div class="sh-title">${sess.label.toUpperCase()}</div>
        <span class="tag tag-${sess.type}">${sess.type}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="prog-bar" style="flex:1"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div style="font-size:12px;color:var(--t3);font-family:var(--fd);font-weight:600">${pct}%</div>
      </div>
    </div>
    ${exHtml}
    <button class="add-ex-btn" onclick="openSheet('addEx')">+ Add exercise</button>
    <div class="session-finish-wrap">
      <button class="btn btn-primary" onclick="finishSession()">FINISH & LOG ✓</button>
      <div style="height:10px"></div>
      <button class="btn btn-secondary" onclick="cancelSession()">Discard session</button>
    </div>`;
}

function toggleWeightEditor(ei){
  const we=document.getElementById(`we-${ei}`);
  if(!we)return;
  const isOpen=we.classList.contains('open');
  document.querySelectorAll('.weight-editor').forEach(w=>w.classList.remove('open'));
  if(!isOpen){we.classList.add('open');document.getElementById(`wei-${ei}`)?.focus();}
}

function adjWeight(ei,delta){
  const inp=document.getElementById(`wei-${ei}`);
  if(!inp)return;
  const cur=parseFloat(inp.value)||0;
  inp.value=Math.max(0,(cur+delta)).toFixed(1).replace('.0','');
}
function setWeight(ei,val){
  const u=U();
  if(!u.activeSession)return;
  u.activeSession.exercises[ei].actualWeight=parseFloat(val)||0;

function saveWeight(ei){
  const inp=document.getElementById(`wei-${ei}`);
  if(!inp)return;
  const val=parseFloat(inp.value)||0;
  const u=U();
  if(!u.activeSession)return;
  const e=u.activeSession.exercises[ei];
  e.actualWeight=val;
  // also save back to plan so it persists
  const st=SESSION_TYPES.find(s=>s.key===u.activeSession.key);
  if(st){
    const planEx=u.plan[st.planKey][st.dayIdx].exercises.find(ex=>ex.id===e.id);
    if(planEx){planEx.weight=val;planEx.actualWeight=val;}
  }
  save();
  document.getElementById(`we-${ei}`).classList.remove('open');
  // update display
  const disp=document.querySelector(`#exc-${ei} .ex-weight-display`);
  if(disp)disp.innerHTML=`${val}<span class="ex-weight-unit"> ${e.unit||''}</span>`;
  showToast(`Weight saved: ${val} ${e.unit||'lbs'}`,'t-good');
}

function toggleSet(ei,setIdx){
  const u=U();
  if(!u.activeSession)return;
  const e=u.activeSession.exercises[ei];
  e.completedSets=setIdx<e.completedSets?setIdx:setIdx+1;
  save();
  // update just that set button for snappy feel
  const card=document.getElementById(`exc-${ei}`);
  if(card){
    card.querySelectorAll('.set-btn').forEach((b,i)=>b.classList.toggle('done',i<e.completedSets));
    const allDone=e.completedSets>=e.sets;
    card.classList.toggle('completed',allDone);
    card.querySelector('.ex-num').classList.toggle('completed',allDone);
  }
  // update progress bar
  const sess=u.activeSession;
  const totalSets=sess.exercises.reduce((a,ex)=>a+ex.sets,0);
  const doneSets=sess.exercises.reduce((a,ex)=>a+Math.min(ex.completedSets,ex.sets),0);
  const pct=totalSets?Math.round(doneSets/totalSets*100):0;
  const fill=document.querySelector('.prog-fill');
  if(fill)fill.style.width=pct+'%';
  const pctLabel=document.querySelector('.session-header [style*="font-size:12px"]');
  if(pctLabel)pctLabel.textContent=pct+'%';
}

function finishSession(){
  const u=U();
  if(!u.activeSession)return;
  const sess=u.activeSession;
  const doneSets=sess.exercises.reduce((a,e)=>a+Math.min(e.completedSets,e.sets),0);
  u.log.push({
    date:new Date().toISOString(),
    sessionKey:sess.key,
    label:sess.label,type:sess.type,
    setsCompleted:doneSets,
    exercisesCount:sess.exercises.length,
    exercises:sess.exercises.map(e=>({name:e.name,sets:e.sets,reps:e.reps,weight:e.actualWeight||e.weight,unit:e.unit})),
    duration:Math.round((Date.now()-new Date(sess.startTime))/60000),
  });
  u.lastSessionKey=sess.key;
  u.activeSession=null;
  save();
  showToast('Session logged! 💪','t-good');
  nav('log',document.querySelector('[data-screen="log"]'));
}

function cancelSession(){
  if(!confirm('Discard this session?'))return;
  U().activeSession=null;
  save();
  nav('home',document.querySelector('[data-screen="home"]'));
}

  const u=U();
  if(!u.records)u.records={};
  if(!u.records[name])u.records[name]=[];
  u.records[name].push({date:new Date().toISOString(),weight,unit:document.getElementById('sh-unit').value,reps:document.getElementById('sh-reps').value||'?'});
  save();closeSheet();renderRecords();showToast('PR saved ★','t-good');
}

function sheetViewRecord({name}){
  const n=decodeURIComponent(name);
  const u=U();
  const entries=(u.records&&u.records[n])||[];
  const best=entries.reduce((a,e)=>e.weight>a.weight?e:a,entries[0]);
  const histHtml=entries.slice().reverse().map(e=>`
    <div class="wh-entry">
      <div class="wh-date">${new Date(e.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'})} · ${e.reps} reps</div>
      <div class="wh-val">${e.weight} <span style="font-size:12px;color:var(--t3)">${e.unit}</span></div>
    </div>`).join('');
  return`<div class="sheet-handle"></div>
    <div class="sheet-title">${n}</div>
    <div style="padding:0 20px 16px">
      <div style="background:var(--a-dim);border:1px solid rgba(200,255,0,.2);border-radius:14px;padding:16px">
        <div style="font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Personal best</div>
        <div style="font-family:var(--fd);font-size:52px;font-weight:700;color:var(--accent);line-height:1">${best.weight} <span style="font-size:18px;color:var(--t3)">${best.unit}</span></div>
      </div>
    </div>
    ${histHtml}
    <div style="padding:16px 20px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-primary" onclick="closeSheet();openSheet('addRecord')">+ Add new entry</button>
      <button class="btn btn-secondary" style="color:var(--red);border-color:rgba(255,71,87,.3)" onclick="deleteRecord('${name}')">Delete all records</button>
    </div>`;
}
function deleteRecord(name){
  const n=decodeURIComponent(name);
  if(!confirm(`Delete all records for "${n}"?`))return;
  delete U().records[n];
  save();closeSheet();renderRecords();showToast('Deleted','t-warn');
}

// ═══════════════ UTILS ═══════════════
function switchUser(id){S.activeUser=id;save();nav('home',document.querySelector('[data-screen="home"]'));}

function showToast(msg,cls=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=cls+' show';
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='',2400);
}

// ═══════════════ INIT ═══════════════
nav(S.screen||'home',document.querySelector(`[data-screen="${S.screen||'home'}"]`));
</script>
</body>
</html>
