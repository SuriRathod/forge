<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#181818;--s3:#202020;--s4:#2a2a2a;
  --b1:#1e1e1e;--b2:#2c2c2c;--b3:#3a3a3a;
  --accent:#C8FF00;--a-dim:rgba(200,255,0,.1);--a-mid:rgba(200,255,0,.25);
  --orange:#FF6B2B;--o-dim:rgba(255,107,43,.1);
  --green:#39D353;--g-dim:rgba(57,211,83,.1);
  --blue:#4DA6FF;--bd:rgba(77,166,255,.1);
  --pink:#FF6EB4;--pd:rgba(255,110,180,.1);
  --red:#FF4757;
  --t1:#F5F5F5;--t2:#999;--t3:#555;
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
  --nav-h:68px;
}
html{height:100%;background:var(--bg)}
body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--fb);overflow:hidden;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}



/* Android Chrome improvements */
@media (hover: none) and (pointer: coarse) {
  .btn { min-height: 44px; }
  .set-btn { min-height: 48px; min-width: 48px; }
  .nav-item { min-height: 48px; }
  .profile-chip { min-height: 40px; }
  .sp-option { min-height: 56px; }
  .pdb-header { min-height: 56px; }
}
/* Remove 300ms tap delay everywhere */
* { touch-action: manipulation; }
/* Android status bar space */
#nav { padding-bottom: max(var(--safe-bottom), 8px); }
/* Better Android font rendering */
body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
/* Prevent text selection during workout */
.ex-card, .set-btn, .nav-item, .btn { -webkit-user-select: none; user-select: none; }

/* Prevent scroll bleed on iOS */
.screen{-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
#sheet{overscroll-behavior:contain}
/* Ensure weight editor doesn't get cut off */
.ex-card{overflow:visible}
.weight-editor{border-radius:0 0 16px 16px}
/* Better touch targets */
.set-btn{touch-action:manipulation}
.we-adj{touch-action:manipulation}
.btn{touch-action:manipulation}
/* Active states for touch */
.ex-card:active{opacity:.95}
.profile-chip:active{transform:scale(.96)}
.rec-card:active{transform:scale(.97)}
/* Smooth number transition on weight display */
.ex-weight-display{transition:color .2s}
/* Session completed exercise subtle check */
.ex-card.completed .ex-card-top{opacity:.75}
/* Better plan day expand animation */
.pdb-exercises{animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
/* Log entry expand */
.le-ex-list{animation:slideDown .15s ease}
/* PR card hover state */
.rec-card{transition:transform .15s,border-color .15s}
/* Streak glow */
.streak-num{text-shadow:0 0 30px currentColor}
/* Improve form inputs on iOS - prevent zoom */
.form-input{font-size:16px!important}

/* SCREENS */
#app{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 20px);display:none}
.screen.active{display:block}

/* NAV */
#nav{height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--s1);border-top:1px solid var(--b1);display:flex;align-items:flex-start;flex-shrink:0;position:relative;z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 4px 0;cursor:pointer;color:var(--t3);transition:color .15s;border:none;background:none;font-family:var(--fb)}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:22px;line-height:1;display:block}
.nav-label{font-size:10px;letter-spacing:.5px;font-weight:500;text-transform:uppercase}

/* TOAST */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--s2);border:1px solid var(--b2);border-radius:24px;padding:10px 20px;font-size:13px;color:var(--t1);z-index:200;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;font-family:var(--fb)}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.t-good{border-color:var(--green);color:var(--green)}
#toast.t-warn{border-color:var(--orange);color:var(--orange)}

/* SHEET */
#sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px)}
#sheet-overlay.open{opacity:1;pointer-events:all}
#sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;background:var(--s2);border-radius:24px 24px 0 0;border-top:1px solid var(--b2);z-index:101;transition:transform .35s cubic-bezier(.32,0,.67,0);padding-bottom:calc(var(--safe-bottom) + 16px);max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
#sheet.open{transform:translateX(-50%) translateY(0);transition-timing-function:cubic-bezier(.33,1,.68,1)}
.sheet-handle{width:36px;height:4px;background:var(--b3);border-radius:2px;margin:12px auto 20px}
.sheet-title{font-family:var(--fd);font-size:26px;font-weight:700;letter-spacing:.5px;padding:0 20px;margin-bottom:20px}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;cursor:pointer;font-family:var(--fd);font-weight:600;letter-spacing:.5px;transition:all .15s;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--accent);color:#000;font-size:17px;padding:15px;width:100%}
.btn-secondary{background:var(--s3);color:var(--t1);font-size:15px;padding:13px;width:100%;border:1px solid var(--b2)}
.btn-ghost{background:transparent;color:var(--t2);font-size:14px;padding:10px 16px;border:1px solid var(--b2)}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:8px}
.btn-icon{width:40px;height:40px;border-radius:10px;background:var(--s3);color:var(--t2);font-size:18px;flex-shrink:0}
.btn-danger-text{background:transparent;color:var(--red);font-size:15px;padding:13px;width:100%;border:1px solid rgba(255,71,87,.3)}

/* FORM */
.form-group{margin-bottom:14px;padding:0 20px}
.form-label{font-size:11px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:6px}
.form-input{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:12px;padding:14px 16px;color:var(--t1);font-size:16px;font-family:var(--fb);outline:none;-webkit-appearance:none;appearance:none}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;margin-bottom:14px}
.form-row-3{grid-template-columns:1fr 1fr 1fr}
.form-row .form-group{padding:0;margin:0}
select.form-input option{background:var(--s2)}

/* TAGS */
.tag{display:inline-block;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;font-family:var(--fd)}
.tag-push{background:rgba(77,166,255,.15);color:var(--blue)}
.tag-pull{background:rgba(57,211,83,.15);color:var(--green)}
.tag-legs{background:rgba(255,107,43,.15);color:var(--orange)}
.tag-cardio{background:rgba(200,255,0,.12);color:var(--accent)}
.tag-hotel{background:rgba(255,71,87,.12);color:var(--red)}
.tag-rest{background:var(--s3);color:var(--t3)}

/* PROFILE AVATAR */
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:15px;font-weight:700;flex-shrink:0}
.av-suri{background:linear-gradient(135deg,#C8FF00,#7db800);color:#000}
.av-harshita{background:linear-gradient(135deg,#FF6EB4,#c0397e);color:#fff}

/* HOME */
.home-hero{background:linear-gradient(135deg,var(--s2) 0%,var(--s1) 100%);margin:16px;border-radius:20px;padding:20px;border:1px solid var(--b1);position:relative;overflow:hidden}
.home-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,var(--a-dim) 0%,transparent 70%)}
.home-hero.her::before{background:radial-gradient(circle,var(--pd) 0%,transparent 70%)}

<!-- Android install prompt -->
<div id="install-banner" style="display:none;position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px);left:12px;right:12px;z-index:60;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:14px 16px;display:none;align-items:center;gap:12px;box-shadow:0 4px 24px rgba(0,0,0,.5)">
  <div style="width:40px;height:40px;border-radius:10px;background:#0a0a0a;border:1px solid #333;display:flex;align-items:center;justify-content:center;flex-shrink:0">
    <span style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#C8FF00">F</span>
  </div>
  <div style="flex:1">
    <div style="font-size:13px;font-weight:500;color:#f5f5f5">Add FORGE to home screen</div>
    <div style="font-size:11px;color:#666;margin-top:2px">Works offline · feels like a real app</div>
  </div>
  <button onclick="doInstall()" style="background:#C8FF00;color:#000;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;flex-shrink:0">ADD</button>
  <button onclick="document.getElementById('install-banner').style.display='none'" style="background:transparent;border:none;color:#555;font-size:20px;cursor:pointer;padding:0 4px;flex-shrink:0">×</button>
</div>
<script>
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  // Show banner after 3 seconds
  setTimeout(function() {
    var banner = document.getElementById('install-banner');
    if (banner && !localStorage.getItem('forge_installed')) {
      banner.style.display = 'flex';
    }
  }, 3000);
});
function doInstall() {
  var banner = document.getElementById('install-banner');
  if (banner) banner.style.display = 'none';
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(r) {
      if (r.outcome === 'accepted') {
        localStorage.setItem('forge_installed', '1');
      }
      deferredPrompt = null;
    });
  }
}
window.addEventListener('appinstalled', function() {
  localStorage.setItem('forge_installed', '1');
  var banner = document.getElementById('install-banner');
  if (banner) banner.style.display = 'none';
});
</script>

function todayIdx(){const d=new Date().getDay();return d===0?6:d-1}
function calcStreak(u){
  if(!u.log?.length)return 0;
  const sorted=[...u.log].sort((a,b)=>new Date(b.date)-new Date(a.date));
  let streak=0,check=new Date();check.setHours(0,0,0,0);
  for(const l of sorted){
    const ld=new Date(l.date);ld.setHours(0,0,0,0);
    if(Math.round((check-ld)/86400000)<=1){streak++;check=ld;}else break;
  }
  return streak;
}
function nextKey(u){
  const sessions=u.sessions||[];
  const order=sessions.filter(s=>s.key!=='rest'&&s.key!=='hotel').map(s=>s.key);
  if(!u.lastSessionKey||!order.includes(u.lastSessionKey))return order[0]||'push';
  const now=new Date(),ws=new Date(now);
  ws.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));ws.setHours(0,0,0,0);
  const doneKeys=new Set(u.log.filter(l=>new Date(l.date)>=ws).map(l=>l.sessionKey));
  const idx=order.indexOf(u.lastSessionKey);
  for(let i=1;i<=order.length;i++){
    const nk=order[(idx+i)%order.length];
    if(!doneKeys.has(nk))return nk;
  }
  return order[(order.indexOf(u.lastSessionKey)+1)%order.length];
}
function getSessionData(u,key){
  const st=(u.sessions||[]).find(s=>s.key===key);
  if(!st)return null;
  const planKey=st.planKey||'home';
  const dayExercises=u.plan[planKey]?.[st.dayIdx]?.exercises||[];
  return{...st,exercises:dayExercises};
}

  const now=new Date();

  const dayLabels=isSuri()?['PA','PuA','C','Lg','PB','PuB','R']:['Pu','CA','Lg','CB','Pu','CG','R'];
  const weekHtml=['M','T','W','T','F','S','S'].map((d,i)=>{
    const dd=new Date(ws);dd.setDate(ws.getDate()+i);
    const done=u.log.some(l=>{const ld=new Date(l.date);ld.setHours(0,0,0,0);return ld.getTime()===dd.getTime();});
    const isToday=i===di;
    const planDay=(u.plan[planKey]||[])[i];
    const isRest=planDay?.type==='rest';
    return`<div class="wday ${isToday?`today ${tc()}`:''} ${done?'done':''} ${isRest&&!done?'rest-day':''}">

      <div class="wday-lbl">${dayLabels[i]||'—'}</div>

  }).join('');

  const total=u.log.length;

  const greet=()=>{const h=new Date().getHours();if(h<12)return'Good morning';if(h<17)return'Good afternoon';return'Good evening';};

          <div class="streak-label">day streak 🔥</div>
          <div style="font-size:11px;color:var(--t3);margin-top:2px">${streak===0?'Start today!':streak<7?'Building momentum':'On fire! 🔥'}</div>
        </div>

    </div>
    ${u.log.length ? `<div style="padding:0 16px 4px;font-size:11px;color:var(--t3)">
      Last session: <span style="color:var(--t2)">${new Date(u.log[u.log.length-1].date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}</span>

    <div class="section-hdr">

function startSession(key){
  const u=U();
  const st=(u.sessions||[]).find(s=>s.key===key);
  if(!st)return;
  const planKey=st.planKey||'home';
  const planDay=u.plan[planKey]?.[st.dayIdx];
  if(!planDay)return;
  u.activeSession={
    key,label:st.label,type:st.type,
    startTime:new Date().toISOString(),
    exercises:clone(planDay.exercises).map(e=>({...e,completedSets:0,actualWeight:e.weight})),
  };
  save();nav('session',document.querySelector('[data-screen="session"]'));
}

          <button class="we-save ${tc()}" onclick="saveW(${ei})">Save</button>

function toggleWE(ei){
  const we=document.getElementById(`we-${ei}`);
  if(!we)return;
  const open=we.classList.contains('open');
  document.querySelectorAll('.weight-editor').forEach(w=>w.classList.remove('open'));
  if(!open){we.classList.add('open');document.getElementById(`wei-${ei}`)?.focus();}
}
function adjW(ei,d){
  const inp=document.getElementById(`wei-${ei}`);
  if(!inp)return;
  inp.value=Math.max(0,(parseFloat(inp.value)||0)+d).toFixed(1).replace(/\.0$/,'');
}
function saveW(ei){
  const inp=document.getElementById(`wei-${ei}`);
  if(!inp)return;
  const val=parseFloat(inp.value)||0;
  const u=U();
  if(!u.activeSession)return;
  const e=u.activeSession.exercises[ei];
  e.actualWeight=val;
  // persist to plan
  const st=(u.sessions||[]).find(s=>s.key===u.activeSession.key);
  if(st){
    const pk=st.planKey||'home';
    const px=u.plan[pk]?.[st.dayIdx]?.exercises?.find(x=>x.id===e.id);
    if(px){px.weight=val;}
  }
  save();
  document.getElementById(`we-${ei}`).classList.remove('open');
  const disp=document.querySelector(`#exc-${ei} .ex-weight-display`);
  if(disp)disp.innerHTML=`${val}<span class="ex-weight-unit"> ${e.unit||''}</span>`;
  const oldW = e.actualWeight ?? e.weight ?? 0;
  const msg = val > oldW && oldW > 0 ? `💪 PR weight! ${val} ${e.unit||'lbs'}` : `Saved: ${val} ${e.unit||'lbs'} ✓`;
  showToast(msg, val > oldW && oldW > 0 ? 't-good' : 't-good');
}
function toggleSet(ei,si){
  const u=U();if(!u.activeSession)return;
  const e=u.activeSession.exercises[ei];
  e.completedSets=si<e.completedSets?si:si+1;
  save();
  const card=document.getElementById(`exc-${ei}`);
  if(card){
    card.querySelectorAll('.set-btn').forEach((b,i)=>b.classList.toggle('done',i<e.completedSets));
    const allDone=e.completedSets>=e.sets;
    card.classList.toggle('completed',allDone);
  }
  const sess=u.activeSession;
  const tot=sess.exercises.reduce((a,ex)=>a+ex.sets,0);
  const done=sess.exercises.reduce((a,ex)=>a+Math.min(ex.completedSets,ex.sets),0);
  const pct=tot?Math.round(done/tot*100):0;
  const fill=document.querySelector('.prog-fill');if(fill)fill.style.width=pct+'%';
  const lbl=document.getElementById('pct-label');if(lbl)lbl.textContent=pct+'%';
}
function finishSession(){
  const u=U();if(!u.activeSession)return;
  const sess=u.activeSession;
  const done=sess.exercises.reduce((a,e)=>a+Math.min(e.completedSets,e.sets),0);
  u.log.push({date:new Date().toISOString(),sessionKey:sess.key,label:sess.label,type:sess.type,
    setsCompleted:done,exercisesCount:sess.exercises.length,
    exercises:sess.exercises.map(e=>({name:e.name,sets:e.sets,reps:e.reps,weight:e.actualWeight??e.weight,unit:e.unit})),
    duration:Math.round((Date.now()-new Date(sess.startTime))/60000)});
  u.lastSessionKey=sess.key;u.activeSession=null;
  save();showToast('Session logged! 💪','t-good');
  nav('log',document.querySelector('[data-screen="log"]'));
}
function cancelSession(){
  if(!confirm('Discard this session?'))return;
  U().activeSession=null;save();nav('home',document.querySelector('[data-screen="home"]'));
}

    <div style="padding:0 20px">
      <button class="btn btn-primary" style="background:${accentColor()};color:${isSuri()?'#000':'#fff'}" onclick="doAddRecord()">Save PR</button>
      <div style="height:10px"></div><button class="btn btn-secondary" onclick="closeSheet()">Cancel</button>
    </div>`;
}
function doAddRecord(){
  const name=document.getElementById('sh-name').value.trim();
  const weight=+document.getElementById('sh-weight').value;
  if(!name||!weight){showToast('Fill in exercise and weight','t-warn');return;}
  const u=U();if(!u.records)u.records={};if(!u.records[name])u.records[name]=[];
  u.records[name].push({date:new Date().toISOString(),weight,unit:document.getElementById('sh-unit').value,reps:document.getElementById('sh-reps').value||'?'});
  save();closeSheet();renderRecords();showToast('PR saved ★','t-good');
}

function sheetViewRecord({name}){
  const n=decodeURIComponent(name);
  const u=U();
  const entries=(u.records?.[n])||[];
  const best=entries.reduce((a,e)=>e.weight>a.weight?e:a,entries[0]);
  return`<div class="sheet-handle"></div>
    <div class="sheet-title">${n}</div>
    <div style="padding:0 20px 16px">
      <div style="background:${isSuri()?'var(--a-dim)':'var(--pd)'};border:1px solid ${isSuri()?'rgba(200,255,0,.2)':'rgba(255,110,180,.2)'};border-radius:14px;padding:16px">
        <div style="font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Personal best</div>
        <div style="font-family:var(--fd);font-size:52px;font-weight:700;color:${accentColor()};line-height:1">${best.weight} <span style="font-size:18px;color:var(--t3)">${best.unit}</span></div>
      </div>
    </div>
    ${[...entries].reverse().map(e=>`
      <div class="wh-entry">
        <div class="wh-date">${new Date(e.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'})} · ${e.reps} reps</div>
        <div class="wh-val" style="color:${accentColor()}">${e.weight} <span style="font-size:12px;color:var(--t3)">${e.unit}</span></div>
      </div>`).join('')}
    <div style="padding:16px 20px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-primary" style="background:${accentColor()};color:${isSuri()?'#000':'#fff'}" onclick="closeSheet();openSheet('addRecord')">+ Add entry</button>
      <button class="btn btn-danger-text" onclick="deleteRecord('${name}')">Delete all records</button>
    </div>`;
}
function deleteRecord(name){
  const n=decodeURIComponent(name);
  if(!confirm(`Delete all records for "${n}"?`))return;
  delete U().records[n];save();closeSheet();renderRecords();showToast('Deleted','t-warn');
}

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function switchUser(id){
  S.activeUser=id;planMode='home';expandedDay=-1;
  save();nav(S.screen||'home',document.querySelector(`[data-screen="${S.screen||'home'}"]`));
}
function showToast(msg,cls=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=cls+' show';
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='',2400);
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
nav(S.screen||'home',document.querySelector(`[data-screen="${S.screen||'home'}"]`));
</script>

<script>
// Register service worker for offline PWA support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    var swCode = `
      const CACHE = 'forge-v3';
      const ASSETS = [self.location.href];
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        ));
        self.clients.claim();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
            if (resp && resp.status === 200 && resp.type === 'basic') {
              caches.open(CACHE).then(c => c.put(e.request, resp.clone()));
            }
            return resp;
          }).catch(() => caches.match(e.request)))
        );
      });
    `;
    try {
      var blob = new Blob([swCode], {type: 'application/javascript'});
      var swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl, {scope: './'})
        .then(function(reg) { console.log('SW registered'); })
        .catch(function(e) { console.log('SW failed', e); });
    } catch(e) {}
  });
}
</script>
